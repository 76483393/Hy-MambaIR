name: Hy-MambaIR_refinement_x4
inherits: train_hymambair_core.yaml

notes:
  - attentive state-space output refinement
  - element-wise add fusion
  - intermediate paper-line variant before the final local refinement design

train:
  optim_g:
    type: Adam
    lr: 2e-5
    weight_decay: 1e-4
    betas: [0.9, 0.999]
  scheduler:
    type: MultiStepLR
    milestones: [8000, 14000, 18000]
    gamma: 0.5
  total_iter: 20000
  warmup_iter: 1000
  gradient_accumulation_steps: 24
  use_amp: true
