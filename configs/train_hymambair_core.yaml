name: Hy-MambaIR_core_x4
model_type: HyMambaIRModel
scale: 4
num_gpu: 1
manual_seed: 42

datasets:
  train:
    name: CT_Train
    type: PairedImageDataset
    dataroot_gt: ./datasets/ct_conglomerate/train/hr
    dataroot_lq: ./datasets/ct_conglomerate/train/lr
    color: y
    filename_tmpl: '{}'
    io_backend:
      type: disk
    scale: 4
    gt_size: 256
    use_hflip: true
    use_rot: true
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 3
    pin_memory: true
    phase: train
  val:
    name: CT_Val
    type: PairedImageDataset
    dataroot_gt: ./datasets/ct_conglomerate/val/hr
    dataroot_lq: ./datasets/ct_conglomerate/val/lr
    color: y
    filename_tmpl: '{}'
    io_backend:
      type: disk
    scale: 4
    gt_size: 256
    img_size: 64
    num_worker_per_gpu: 4
    pin_memory: true
    phase: val

network_g:
  type: HyMambaIR
  upscale: 4
  in_chans: 1
  img_size: 64
  img_range: 1.0
  embed_dim: 174
  d_state: 16
  depths: [6, 6, 6, 6, 6, 6, 6, 6, 6]
  num_heads: [6, 6, 6, 6, 6, 6, 6, 6, 6]
  window_size: 16
  inner_rank: 64
  num_tokens: 128
  convffn_kernel_size: 5
  mlp_ratio: 2.0
  upsampler: pixelshuffle
  resi_connection: 1conv

path:
  pretrain_network_g: ~
  strict_load_g: false
  resume_state: ~

train:
  optim_g:
    type: Adam
    lr: 5e-5
    weight_decay: 1e-6
    betas: [0.9, 0.999]
  scheduler:
    type: MultiStepLR
    milestones: [6000, 10000, 13000]
    gamma: 0.5
  total_iter: 15000
  warmup_iter: 200
  gradient_accumulation_steps: 24
  use_amp: true
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: 200
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher
    lpips:
      type: calculate_lpips_hymambair
      crop_border: 4
      better: lower
      net: alex
